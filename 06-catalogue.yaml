- name: Setup Catalogue Service
  hosts: catalogue
  become: true
  vars:
    mongodb_ip: "{{ hostvars['mongodb'].ansible_host }}"
  
  tasks:
    - name: Disable default NodeJS module
      ansible.builtin.command: dnf module disable nodejs -y
    
    - name: Enable NodeJS 20.x repository
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Install NodeJS
      ansible.builtin.package:
        name: nodejs
        state: present

    - name: Add roboshop system user
      ansible.builtin.user:
        name: roboshop
        comment: "Roboshop System User"
        system: true
        shell: /sbin/nologin
        home: /app

    - name: Create app directory
      ansible.builtin.file:
        state: directory
        path: /app

    - name: Download Catalogue Service code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: Unzip Catalogue Service code
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: Install NodeJS dependencies
      community.general.npm:
        path: /app

    - name: Copy Catalogue Service systemd file
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: Update MongodB URL 
      ansible.builtin.replace:
        path: /etc/systemd/system/catalogue.service
        regexp: 'mongodb://.*:27017'
        replace: 'mongodb://{{ mongodb_ip }}:27017'

    - name: Copy Mongo Repository file
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: Re-load daemon to pick up new service file
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start and Enable Catalogue Service
      ansible.builtin.service:
        name: catalogue
        state: started
        enabled: true

    - name: Install Mongodb Client
      ansible.builtin.package:
        name: mongodb-mongosh
        state: present

    - name: Connect to mongodb catalogue
      ansible.builtin.command: mongosh {{ mongodb_ip }} --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
      register: catalogue_output

    - name: Print catalogue output
      ansible.builtin.debug:
        msg: "{{ catalogue_output }}"